<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f5f0e7" />
    <title>The Quish Family</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <section id="list-view" class="view view-visible" aria-labelledby="listTitle">
        <header class="list-header">
          <h1 id="listTitle">The Quish Family</h1>
          <p class="subtitle">
            Our family in the 1901 and 1911 Irish census.
          </p>
          <div class="search-wrap">
            <input
              id="searchInput"
              type="search"
              autocomplete="off"
              placeholder="Search a name or place"
              aria-label="Search a name or place"
            />
          </div>
        </header>

        <main id="householdList" class="household-list" aria-live="polite"></main>
      </section>

      <section
        id="detail-view"
        class="view"
        aria-labelledby="detailTitle"
        aria-hidden="true"
      >
        <header class="detail-header">
          <button id="backButton" class="back-button" type="button" aria-label="Back">
            <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
              <path
                d="M15 5l-7 7 7 7"
                fill="none"
                stroke="currentColor"
                stroke-width="2.25"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <span>Back</span>
          </button>
        </header>
        <main id="detailBody" class="detail-body"></main>
      </section>
    </div>

    <script src="./viz-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
